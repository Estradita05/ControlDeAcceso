version: "3.8"

services:

  laravel:
    build: ./web-admin
    ports:
      - "8080:80"
    volumes:
      - ./web-admin:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: control_acceso
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"