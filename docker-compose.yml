services:

  app:
    build: ./docker/php
    container_name: controlacceso_php
    volumes:
      - ./web-admin:/var/www
    networks:
      - controlacceso

  nginx:
    image: nginx:latest
    container_name: controlacceso_nginx
    ports:
      - "8085:80"
    volumes:
      - ./web-admin:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - controlacceso

  postgres:
    image: postgres:15
    container_name: controlacceso_postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: control_acceso
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - controlacceso

  pgadmin:
    image: dpage/pgadmin4
    container_name: controlacceso_pgadmin
    ports:
      - "8086:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    networks:
      - controlacceso

volumes:
  postgres_data:

networks:
  controlacceso: