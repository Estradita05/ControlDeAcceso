services:

  api:
    build: ./MIApi
    container_name: fastapi_server
    ports:
      - "5050:5050"
    depends_on:
      - db
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/control_acceso

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: control_acceso
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  web:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: laravel_web
    ports:
      - "8000:8000"
    depends_on:
      - api
      - db
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=control_acceso
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
